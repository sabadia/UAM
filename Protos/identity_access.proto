syntax = "proto3";

option csharp_namespace = "Identity.Grpc.Identity.V1";

package identity.identity.v1;

service IdentityAccess {
  rpc AuthorizeTenantAccess (AuthorizeTenantAccessRequest) returns (AuthorizeTenantAccessResponse);
}

message AuthorizeTenantAccessRequest {
  string user_id = 1;
  string tenant_id = 2;
}

message AuthorizeTenantAccessResponse {
  bool is_allowed = 1;
  repeated string roles = 2;
  repeated string permissions = 3;
}
